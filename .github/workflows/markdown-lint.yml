name: markdown lint

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - "main"
      - "release-**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-run-markdown-lint: ${{ steps.changes.outputs.markdown == 'true' }}
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: changes
        with:
          filters: |
            markdown:
              - '**.md'
              - '.github/workflows/markdown-lint.yml'

  markdown-toc:
    needs: [changes]
    if: github.event.pull_request.draft == false && needs.changes.outputs.should-run-markdown-lint == 'true'
    name: markdown toc
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install markdown-toc
        run: npm install --global markdown-toc@1.2.0

      - name: Verify markdown TOC
        run: |
          markdown-toc --bullets "-" -i CONTRIBUTING.md

          git diff --exit-code -- CONTRIBUTING.md || {
            echo "markdown table of contents is out of date"
            echo 'run: markdown-toc --bullets "-" -i CONTRIBUTING.md'
            exit 1
          }

  skip-markdown-lint:
    needs: [changes]
    if: needs.changes.outputs.should-run-markdown-lint == 'false'
    name: markdown toc
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - run: 'echo "No markdown linting required"'
